name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            spec: assessment-tool-macos.spec
            artifact: CMMIAssessment-macOS
            exe_name: assessment-tool
          - os: windows-latest
            spec: assessment-tool-windows.spec
            artifact: CMMIAssessment-Windows
            exe_name: assessment-tool.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: cd frontend && npm ci && npm run build
      - run: python -m PyInstaller --distpath dist --workpath build_temp ${{ matrix.spec }}
      - name: Assemble distribution ZIP
        shell: python
        run: |
          import shutil, os
          from pathlib import Path

          dist_dir = Path("dist/CMMIAssessment")
          if dist_dir.exists():
              shutil.rmtree(dist_dir)
          dist_dir.mkdir(parents=True)

          exe = Path("dist/${{ matrix.exe_name }}")
          if exe.exists():
              shutil.copy2(str(exe), str(dist_dir / exe.name))

          if Path("README.txt").exists():
              shutil.copy2("README.txt", str(dist_dir / "README.txt"))
          if Path("framework").is_dir():
              shutil.copytree("framework", str(dist_dir / "framework"))
          if Path("templates").is_dir():
              shutil.copytree("templates", str(dist_dir / "templates"))
          else:
              (dist_dir / "templates").mkdir()
          (dist_dir / "exports").mkdir()

          shutil.make_archive("dist/CMMIAssessment", "zip", "dist", "CMMIAssessment")
          size_mb = os.path.getsize("dist/CMMIAssessment.zip") / (1024 * 1024)
          print(f"Distribution ZIP: dist/CMMIAssessment.zip ({size_mb:.1f} MB)")
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: dist/CMMIAssessment.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename artifacts with platform suffix
        run: |
          mkdir -p release
          for dir in artifacts/CMMIAssessment-*; do
            platform=$(basename "$dir" | sed "s/CMMIAssessment-//" | sed "s/-v.*//")
            cp "$dir/CMMIAssessment.zip" "release/CMMIAssessment-${platform}-${{ github.ref_name }}.zip"
          done
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: release/*.zip
