name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            spec: assessment-tool-macos.spec
            artifact: CMMIAssessment-macOS
          - os: windows-latest
            spec: assessment-tool-windows.spec
            artifact: CMMIAssessment-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: cd frontend && npm ci && npm run build
      - run: python -m PyInstaller --distpath dist --workpath build_temp ${{ matrix.spec }}
      - name: Assemble distribution ZIP
        run: python build.py --dist
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: dist/CMMIAssessment.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename artifacts with platform suffix
        run: |
          mkdir -p release
          for dir in artifacts/CMMIAssessment-*; do
            platform=$(basename "$dir" | sed "s/CMMIAssessment-//" | sed "s/-v.*//")
            cp "$dir/CMMIAssessment.zip" "release/CMMIAssessment-${platform}-${{ github.ref_name }}.zip"
          done
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: release/*.zip
