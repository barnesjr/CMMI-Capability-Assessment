name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            spec: assessment-tool-macos.spec
            artifact: CMMIAssessment-macOS
          - os: windows-latest
            spec: assessment-tool-windows.spec
            artifact: CMMIAssessment-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: cd frontend && npm ci && npm run build
      - run: python -m PyInstaller --distpath dist --workpath build_temp ${{ matrix.spec }}
      - run: python build.py --dist
        if: matrix.os == 'macos-latest'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: dist/CMMIAssessment*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: '**/*'
